name: Atualizar Opções B3

on:
  # Executa todo dia útil às 20:00 BRT (23:00 UTC)
  # A B3 fecha às 17:00 BRT, dados ficam disponíveis ~18-19h
  schedule:
    - cron: "0 23 * * 1-5"  # Seg-Sex às 23:00 UTC (20:00 BRT)

  # Permite execução manual
  workflow_dispatch:
    inputs:
      date:
        description: "Data de referência (YYYY-MM-DD). Deixe vazio para último dia útil."
        required: false

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do sistema
        run: sudo apt-get install -y unzip

      - name: Executar script de atualização
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/updateOptions.mjs --date "${{ github.event.inputs.date }}"
          else
            node scripts/updateOptions.mjs
          fi

      - name: Verificar se houve mudanças
        id: changes
        run: |
          if git diff --quiet src/optionsB3.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Nenhuma alteração detectada"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Alterações detectadas!"
          fi

      - name: Commit e push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/optionsB3.json
          DATE=$(date -u -d '-3 hours' +%Y-%m-%d)
          ACTIVE=$(node -e "const d=JSON.parse(require('fs').readFileSync('src/optionsB3.json','utf8'));console.log(d.length)")
          git commit -m "📊 Atualizar opções B3 ($DATE) - $ACTIVE opções ativas"
          git push

      - name: Build do site (opcional)
        if: steps.changes.outputs.changed == 'true'
        run: |
          npm ci
          npm run build
